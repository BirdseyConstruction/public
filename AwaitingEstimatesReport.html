<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML Code Preview Tool</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f5f5f5;
            color: #333;
            line-height: 1.6;
        }
        .container {
            display: flex;
            min-height: 100vh;
            flex-direction: column;
        }
        .header {
            background-color: #007bff;
            color: white;
            padding: 1rem;
            text-align: center;
        }
        .main {
            display: flex;
            flex: 1;
            overflow: hidden;
        }
        .editor-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            border-right: 1px solid #ddd;
        }
        .preview-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        .panel-header {
            background-color: #e9ecef;
            padding: 0.5rem 1rem;
            font-weight: bold;
            border-bottom: 1px solid #ddd;
        }
        #htmlInput {
            width: 100%;
            height: 100%;
            border: none;
            padding: 1rem;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            resize: none;
            outline: none;
        }
        #preview {
            width: 100%;
            height: 100%;
            border: none;
            background-color: white;
        }
        @media (max-width: 768px) {
            .main {
                flex-direction: column;
            }
            .editor-panel {
                border-right: none;
                border-bottom: 1px solid #ddd;
                height: 50vh;
            }
            .preview-panel {
                height: 50vh;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header class="header">
            <h1>HTML Code Preview Tool</h1>
            <p>Paste your HTML code on the left for a live preview on the right.</p>
        </header>
        <div class="main">
            <div class="editor-panel">
                <div class="panel-header">HTML Input</div>
                <textarea id="htmlInput" placeholder="Paste your HTML code here...&#10;&#10;Example:&#10;&lt;h1&gt;Hello, World!&lt;/h1&gt;&#10;&lt;p&gt;This is a dynamic preview.&lt;/p&gt;"></textarea>
            </div>
            <div class="preview-panel">
                <div class="panel-header">Live Preview</div>
                <iframe id="preview" sandbox="allow-same-origin allow-scripts allow-forms allow-popups"></iframe>
            </div>
        </div>
    </div>
    <script>
        const htmlInput = document.getElementById('htmlInput');
        const preview = document.getElementById('preview');

        function updatePreview() {
            const code = htmlInput.value;
            preview.srcdoc = `<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Preview</title>
</head>
<body>
    ${code}
</body>
</html>`;
        }

        // Update on input (real-time)
        htmlInput.addEventListener('input', updatePreview);

        // Initial update
        updatePreview();
    </script>
</body>
</html>
