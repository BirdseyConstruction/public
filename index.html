        function populateTable(data) {
            const tbody = document.getElementById('servicesTable').getElementsByTagName('tbody')[0];
            tbody.innerHTML = '';
            
            data.forEach(service => {
                const row = tbody.insertRow();
                row.innerHTML = `
                    <td><strong>${service.name}</strong></td>
                    <td>${service.unit}</td>
                    <td class="category">${service.category}</td>
                `;
            });
        }

        function filterTable() {
            const input = document.getElementById('search').value.toLowerCase().trim();
            const filtered = services.filter(service => 
                service.name.toLowerCase().includes(input) ||
                service.category.toLowerCase().includes(input)
            );
            populateTable(filtered);
        }

        // Initial load
        window.onload = () => populateTable(services);
